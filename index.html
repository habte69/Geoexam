<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo With Habte - Final Exam</title>
    <style>
        /* CSS ለገጹ ውበት እና ለተንቀሳቃሽ ስልኮች እንዲመች */
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; }
        .container { background-color: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 90%; max-width: 500px; }
        h2 { color: #1a73e8; text-align: center; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .timer { font-size: 20px; font-weight: bold; color: #d93025; text-align: center; margin-bottom: 15px; padding: 10px; border: 2px solid #d93025; border-radius: 8px; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-next { background-color: #1a73e8; color: white; }
        .btn-prev { background-color: #5f6368; color: white; }
        .btn-submit { background-color: #1e8e3e; color: white; width: 100%; margin-top: 15px; }
        #quiz-area, #result-area { display: none; }
        .options-label { display: block; background-color: #f8f9fa; padding: 12px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; border: 1px solid #eee; }
        .selected { background-color: #e8f0fe; border-color: #1a73e8; font-weight: bold; }
        .question { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #333; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <div id="login-area">
        <h2>Geo With Habte Login</h2>
        <p style="text-align: center; color: #666;">ሙሉ ስምህን እና መለያ ቁጥርህን አስገባ።</p>
        <input type="text" id="username" placeholder="Full Name (e.g. Abebe Kassa - 01)">
        <input type="password" id="password" placeholder="Password (geo123)">
        <button class="btn-next" style="width:100%" onclick="checkLogin()">Start Exam</button>
        <p id="msg" style="color:red; text-align:center;"></p>
    </div>

    <div id="quiz-area">
        <div id="time-display" class="timer">Time Left: 10:00</div>
        <div id="progress" style="margin-bottom:10px; color:#666; font-weight: bold;"></div>
        <div id="question-text" class="question"></div>
        <div id="options-container"></div>
        
        <div class="btn-group">
            <button class="btn-prev" id="prev-btn" onclick="prevQuestion()">Previous</button>
            <button class="btn-next" id="next-btn" onclick="nextQuestion()">Next</button>
        </div>
        <button class="btn-submit" id="submit-btn" style="display:none;" onclick="finishQuiz()">Finish & Save Score</button>
    </div>

    <div id="result-area">
        <h2 style="color:#1e8e3e;">Exam Finished!</h2>
        <p style="text-align:center;">ውጤትህን ለመምህሩ ለመላክ ከታች ያለውን ቁልፍ ተጫን።</p>
        <p style="text-align:center; font-size: 13px; color: #d93025;">(ኢንተርኔት መክፈትህን አረጋግጥ)</p>
        <button class="btn-submit" onclick="sendToGoogle()">Submit to Teacher</button>
    </div>
</div>

<script>
    // 1. መቆለፊያ - ተማሪው ቀድሞ ተፈትኖ ከሆነ እንዳይገባ
    if (localStorage.getItem("geo_exam_done") === "true") {
        document.body.innerHTML = "<div class='container'><h2>ይቅርታ!</h2><p style='text-align:center;'>ይህንን ፈተና አንዴ ስለተፈተንክ ድጋሚ መግባት አትችልም።</p></div>";
    }

    // 2. ተማሪው ከገጹ ሊወጣ ሲል ማስጠንቀቂያ ለመስጠት
    window.onbeforeunload = function() {
        return "ፈተናው ገና አልተጠናቀቀም! ከወጣህ ውጤትህ አይመዘገብም።";
    };

    // 3. ኮፒ እንዳይደረግ መከልከል (Keyboard Shortcuts)
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'p')) {
            e.preventDefault();
            alert("ኮፒ ማድረግ የተከለከለ ነው!");
        }
    });

    const validPass = "geo123";
    let studentName = "";
    
    const questions = [
        { q: "What is the primary factor that determines a region's climate?", a: "Latitude", b: "Altitude", c: "Ocean currents", d: "All of the above", correct: "d" },
        { q: "Which climate zone is warm year-round and has high rainfall?", a: "Tropical", b: "Temperate", c: "Arid", d: "Polar", correct: "a" },
        { q: "What is the main difference between weather and climate?", a: "Weather is short-term, Climate is long-term", b: "Climate is short-term", c: "They are same", d: "None", correct: "a" },
        { q: "The Greenhouse Effect is caused by an increase in which gas?", a: "Oxygen", b: "Nitrogen", c: "Carbon Dioxide", d: "Hydrogen", correct: "c" },
        { q: "Which instrument is used to measure air pressure?", a: "Thermometer", b: "Barometer", c: "Anemometer", d: "Hygrometer", correct: "b" }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let timeLeft = 600; 
    let timerInterval;

    function checkLogin() {
        studentName = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        if(studentName.trim().length > 3 && pass === validPass) {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            startTimer();
            showQuestion();
        } else {
            document.getElementById('msg').textContent = "ትክክለኛ ስም እና የይለፍ ቃል አስገባ!";
        }
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('time-display').textContent = `Time Left: ${mins}:${secs < 10 ? '0'+secs : secs}`;
            if (timeLeft <= 0) { finishQuiz(); }
            timeLeft--;
        }, 1000);
    }

    function showQuestion() {
        const qData = questions[currentIdx];
        document.getElementById('progress').textContent = `Question ${currentIdx + 1} of ${questions.length}`;
        document.getElementById('question-text').textContent = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        ['a','b','c','d'].forEach(opt => {
            const label = document.createElement('label');
            label.className = 'options-label' + (userAnswers[currentIdx] === opt ? ' selected' : '');
            label.innerHTML = `<input type="radio" name="opt" value="${opt}" ${userAnswers[currentIdx] === opt ? 'checked' : ''} onchange="saveAnswer('${opt}')"> ${qData[opt]}`;
            container.appendChild(label);
        });
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').style.display = currentIdx === questions.length - 1 ? 'none' : 'inline-block';
        document.getElementById('submit-btn').style.display = currentIdx === questions.length - 1 ? 'block' : 'none';
    }

    function saveAnswer(val) { userAnswers[currentIdx] = val; showQuestion(); }
    function nextQuestion() { if(currentIdx < questions.length-1) { currentIdx++; showQuestion(); } }
    function prevQuestion() { if(currentIdx > 0) { currentIdx--; showQuestion(); } }

    function finishQuiz() {
        clearInterval(timerInterval);
        window.onbeforeunload = null; // ማስጠንቀቂያውን አጥፋ
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
    }

    function sendToGoogle() {
        let score = 0;
        questions.forEach((q, i) => { if(userAnswers[i] === q.correct) score++; });
        
        const baseURL = "https://docs.google.com/forms/d/e/1FAIpQLSeObwervz04M7Wl_z2bL_l3nsRvjtOIZiUfut7fcTF3L_sdSQ/formResponse";
        const finalURL = `${baseURL}?entry.1543763245=${encodeURIComponent(studentName)}&entry.1641522715=${score}/${questions.length}&submit=Submit`;
        
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = finalURL;
        document.body.appendChild(iframe);

        // ስልኩ ላይ "ተፈትኗል" የሚል ምልክት ማስቀመጥ
        localStorage.setItem("geo_exam_done", "true");

        alert("ውጤትህ ተልኳል! መውጣት ትችላለህ።");
        window.location.reload();
    }
</script>
</body>
</html>
```
